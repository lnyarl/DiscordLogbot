services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./data/attachments:/app/data/attachments
      - ./data/emojis:/app/data/emojis
    depends_on:
      logbot-postgres:
        condition: service_healthy
    networks:
      - stashy-network
      - logbot-internal

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    container_name: historian
    env_file: .env
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - ./data/attachments:/app/data/attachments:ro
      - ./data/emojis:/app/data/emojis:ro
    depends_on:
      logbot-postgres:
        condition: service_healthy
    # Docker 기본 embedded DNS(127.0.0.11)가 간헐적으로 실패하는 이슈가 있어
    # discord.com 해석 중 ConnectError → discord_callback 500 → Cloudflare 502 발생.
    # 외부 DNS를 명시적으로 지정해 우회.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - stashy-network
      - logbot-internal

  logbot-postgres:
    image: postgres:16-alpine
    container_name: logbot-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5431:5432"
    environment:
      POSTGRES_DB: logbot
      POSTGRES_USER: logbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - logbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      logbot-internal:
        aliases:
          - postgres
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql

  # ── Go 서비스 (Phase 0 stub — 헬스 엔드포인트만) ─────────────────
  bot-go:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: bot
        PORT: "8081"
    restart: unless-stopped
    env_file: .env
    environment:
      BOT_HEALTH_PORT: "8081"
    depends_on:
      logbot-postgres:
        condition: service_healthy
    networks:
      - logbot-internal

  web-go:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: web
        PORT: "8080"
    restart: unless-stopped
    env_file: .env
    environment:
      WEB_PORT: "8080"
    # Phase 0 stub: 외부 노출 없음. Phase 5/9에서 stashy-network + ports 추가 예정.
    depends_on:
      logbot-postgres:
        condition: service_healthy
    networks:
      - logbot-internal

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: worker
        PORT: "8082"
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_HEALTH_PORT: "8082"
    depends_on:
      logbot-postgres:
        condition: service_healthy
    networks:
      - logbot-internal

volumes:
  logbot_postgres_data:

networks:
  logbot-internal:
    internal: true
  stashy-network:
    external: true
    name: stashy-prod_stashy-network
