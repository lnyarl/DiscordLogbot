# Go 서비스 병행 배포용 overlay.
#
# 운영 중인 Python 봇은 그대로 유지하면서 Go 측 web/worker만 별도로
# 띄워 동작을 검증할 수 있게 한다.
#
# 사용법:
#   docker compose -f docker-compose.yml -f docker-compose.go.yml up -d web-go worker-go
#
# 또는 scripts/go-up.sh 를 사용. Python 봇/웹/워커는 건드리지 않는다.
#
# 봇은 Discord 토큰 한 개당 게이트웨이 세션이 유일하므로 병행 불가:
#   bot-go 를 기본 활성화하면 운영 봇 세션이 끊긴다.
#   필요 시 별도 테스트 토큰 + profile=bot-go 로 활성화 (아래 참고).

services:
  # ── Python 봇 / 웹 / 워커는 base compose 그대로 사용 ──
  # base의 worker 서비스는 Python embedding worker. Go 측은 worker-go 라는
  # 새 서비스로 추가해 양쪽이 같은 DB에 동시 접근 가능 (FOR UPDATE
  # SKIP LOCKED 로 중복 처리 0).

  bot-go:
    # 토큰 충돌 방지를 위해 기본 비활성화. 별도 테스트 토큰을 .env.test
    # 등에 두고 `--profile bot-go` 로만 활성화하도록 분리.
    profiles: ["bot-go"]

  web-go:
    # Python web 은 8080:8000 으로 점유 중이므로 Go web 은 8090 으로 분리.
    # 같은 도메인에서 nginx 라우팅 분기를 쓰는 카나리 배포는 별도 reverse
    # proxy 설정으로 처리.
    ports:
      - "127.0.0.1:8090:8080"
    environment:
      WEB_PORT: "8080"
      # CSS/favicon 을 Python 과 동일 정적 파일로 서빙 — 디자인 픽셀 동등.
      WEB_STATIC_DIR: /app/web/static
      WEB_DATA_DIR: /app/data
    volumes:
      - ./web/static:/app/web/static:ro
      - ./data/attachments:/app/data/attachments:ro
      - ./data/emojis:/app/data/emojis:ro
    networks:
      - stashy-network
      - logbot-internal

  worker-go:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: worker
        PORT: "8083"
    container_name: logbot-worker-go
    restart: unless-stopped
    env_file: .env
    environment:
      WORKER_HEALTH_PORT: "8083"
      # Python 워커가 BATCH_SIZE 32 로 도는 동안 Go 측은 절반으로 시작.
      # SKIP LOCKED 가 있어 중복 처리는 안 일어나지만 한쪽이 큐를 독점하지
      # 않도록 균형을 맞춤. 운영 안정 후 BATCH_SIZE 을 동기화.
      BATCH_SIZE: "16"
      POLL_INTERVAL: "10"
    depends_on:
      logbot-postgres:
        condition: service_healthy
    networks:
      - logbot-internal
