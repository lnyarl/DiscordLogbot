<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Discord 사관{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="brand">Discord 사관</a>
      {% if bot_invite_url %}
      <a href="{{ bot_invite_url }}" target="_blank" rel="noopener" class="bot-invite" title="봇 서버에 추가">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </a>
      {% endif %}
      {% if username is defined and username %}
      <div class="user-info">
        <span>{{ username }}</span>
        <form method="post" action="/auth/logout" style="display:inline">
          <button type="submit" class="btn btn-sm">로그아웃</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
